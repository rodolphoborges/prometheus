name: "CI Protheus 2310"
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Compilar no Docker Local via IP Publico"
        run: |
          # 1. Garante permissão de execução no Ubuntu do GitHub
          chmod +x ./bin/tds-cli
          
          # 2. Executa a compilação apontando para o seu IP 162.120.186.87
          ./bin/tds-cli compile \
            --server ${{ secrets.PROTHEUS_SERVER }} \
            --port 1234 \
            --environment ${{ secrets.PROTHEUS_ENV }} \
            --user ${{ secrets.PROTHEUS_USER }} \
            --password "${{ secrets.PROTHEUS_PASS }}" \
            --program "${{ github.workspace }}/src" \
            --include "${{ github.workspace }}/includes" \
            --save-logs