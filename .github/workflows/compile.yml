name: Compile Protheus

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: "Configurar Permissoes e Compilar"
        env:
          SERVER: ${{ secrets.PROTHEUS_SERVER }}
          ENV: ${{ secrets.PROTHEUS_ENV }}
          USER_NAME: ${{ secrets.PROTHEUS_USER }}
          PASSWORD: ${{ secrets.PROTHEUS_PASS }}
        run: |
          chmod +x ./bin/advpls
          
          # Ajuste para o modo legacy do advpls (Uso do -- para separar argumentos do binário)
          ./bin/advpls --tds-cli-arguments tds-cli -- compile --server $SERVER --port 1234 --environment $ENV --user $USER_NAME --password "$PASSWORD" --program "${{ github.workspace }}/src" --include "${{ github.workspace }}/includes" --save-logs