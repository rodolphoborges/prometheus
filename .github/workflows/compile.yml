name: Compilacao Protheus
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar TDS-CLI
        run: npm install -g @totvs/tds-cli

      - name: Compilar no Protheus
        run: |
          tds-cli compile \
            --server ${{ secrets.PROTHEUS_SERVER }} \
            --port 1234 \
            --environment ${{ secrets.PROTHEUS_ENV }} \
            --user ${{ secrets.PROTHEUS_USER }} \
            --password "${{ secrets.PROTHEUS_PASS }}" \
            --program "${{ github.workspace }}/src" \
            --include "${{ github.workspace }}/includes" \
            --save-logs
