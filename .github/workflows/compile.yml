name: Compile Protheus

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: "Configurar Permissoes e Compilar"
        env:
          SERVER: ${{ secrets.PROTHEUS_SERVER }}
          ENV: ${{ secrets.PROTHEUS_ENV }}
          USER_NAME: ${{ secrets.PROTHEUS_USER }}
          PASSWORD: ${{ secrets.PROTHEUS_PASS }}
        run: |
          chmod +x ./bin/advpls
          
          # Diagnóstico de rede: Testar se o IP:Porta está acessível (Firewall?)
          echo "==== DIAGNOSTICO DE REDE ===="
          timeout 5s bash -c "cat < /dev/null > /dev/tcp/$SERVER/1234" && echo "Sucesso: Servidor alcançável via TCP." || echo "ALERTA: Servidor inacessível via porta 1234 (Verifique o Firewall)."
          echo "============================="

          # Criar script de execução via printf (Baseado na validação real do AppServer: build 7.00.210324P e secure 0)
          printf "[authentication]\r\naction=authentication\r\nserver=%s\r\nport=1234\r\nsecure=0\r\nbuild=7.00.210324P\r\nenvironment=%s\r\nuser=%s\r\nusername=%s\r\npsw=%s\r\npassword=%s\r\n\r\n[compile]\r\naction=compile\r\nprogram=%s/src\r\nincludes=%s/includes\r\nrecompile=T\r\n" \
            "$SERVER" "$ENV" "$USER_NAME" "$USER_NAME" "$PASSWORD" "$PASSWORD" "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE" > compile_script.ini
          
          # Garantir encoding CP1252 (ANSI) - Requisito estrito do advpls
          iconv -f UTF-8 -t CP1252 compile_script.ini > compile_script_ansi.ini
          
          # Debug: Confirmar a criação do arquivo (Sem exibir conteúdo sensível)
          echo "--- DEBUG: STATUS ---"
          ls -l $(pwd)/compile_script_ansi.ini
          
          # Executar compilação (Log sempre visível no console)
          echo "==== INICIANDO COMPILACAO ===="
          ./bin/advpls cli "$(pwd)/compile_script_ansi.ini" --log-file advpls.log || echo "Aviso: advpls encerrou com erro (Veja log abaixo)."
          
          echo "==== LOG DE EXECUÇÃO (advpls.log) ===="
          [ -f advpls.log ] && cat advpls.log || echo "Erro: Arquivo advpls.log não foi gerado."