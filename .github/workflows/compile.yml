name: "Compilacao Protheus 2310"
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do Codigo"
        uses: actions/checkout@v4

      - name: "Configurar Permissoes e Compilar"
        run: |
          # Garante permissão de execução ao binário que está no seu repo
          chmod +x ./bin/advpls
          
          # Executa usando o modo 'tds-cli' antes do comando 'compile'
          ./bin/advpls tds-cli compile \
            --server ${{ secrets.PROTHEUS_SERVER }} \
            --port 1234 \
            --environment ${{ secrets.PROTHEUS_ENV }} \
            --user ${{ secrets.PROTHEUS_USER }} \
            --password "${{ secrets.PROTHEUS_PASS }}" \
            --program "${{ github.workspace }}/src" \
            --include "${{ github.workspace }}/includes" \
            --save-logs