name: Compile Protheus

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: "Configurar Permissoes e Compilar"
        env:
          SERVER: ${{ secrets.PROTHEUS_SERVER }}
          ENV: ${{ secrets.PROTHEUS_ENV }}
          USER_NAME: ${{ secrets.PROTHEUS_USER }}
          PASSWORD: ${{ secrets.PROTHEUS_PASS }}
        run: |
          chmod +x ./bin/advpls
          
          # Criar script de execução usando printf (Garante CRLF e evita problemas de expansão do shell)
          printf "[ACTION_01]\r\naction=authentication\r\nserver=%s\r\nport=1234\r\nsecure=0\r\nenvironment=%s\r\nuser=%s\r\npsw=%s\r\n\r\n[ACTION_02]\r\naction=compile\r\nprogram=%s/src\r\nincludes=%s/includes\r\nrecompile=T\r\n" \
            "$SERVER" "$ENV" "$USER_NAME" "$PASSWORD" "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE" > compile_script.ini
          
          # Garantir encoding CP1252 (ANSI) - Requisito estrito do advpls
          iconv -f UTF-8 -t CP1252 compile_script.ini > compile_script_ansi.ini
          
          # Debug: Confirmar o arquivo gerado (Sem exibir conteúdo sensível)
          echo "--- DEBUG: STATUS ---"
          ls -l $(pwd)/compile_script_ansi.ini
          
          # Executar compilação com caminho ABSOLUTO para o script
          ./bin/advpls cli "$(pwd)/compile_script_ansi.ini" --log-file advpls.log || (echo "--- LOG DE ERRO ---" && cat advpls.log && exit 1)