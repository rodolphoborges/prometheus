name: Compile Protheus

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: "Configurar Permissoes e Compilar"
        env:
          SERVER: ${{ secrets.PROTHEUS_SERVER }}
          ENV: ${{ secrets.PROTHEUS_ENV }}
          USER_NAME: ${{ secrets.PROTHEUS_USER }}
          PASSWORD: ${{ secrets.PROTHEUS_PASS }}
        run: |
          chmod +x ./bin/advpls
          
          # Criar template do script para o envsubst (evita substituição acidental de caracteres especiais shell)
          cat <<'EOF' > compile_script.template
          [authentication]
          server=$SERVER
          port=1234
          secure=0
          environment=$ENV
          user=$USER_NAME
          psw=$PASSWORD
          
          [compile]
          action=compile
          program=${GITHUB_WORKSPACE}/src
          includes=${GITHUB_WORKSPACE}/includes
          recompile=T
          EOF
          
          # Injetar variáveis de ambiente de forma segura
          envsubst < compile_script.template > compile_script.ini
          
          # O TDS-CLI (LS) exige encoding CP1252 para scripts de execução
          iconv -f UTF-8 -t CP1252 compile_script.ini > compile_script_ansi.ini
          
          # Executar compilação com log habilitado para diagnóstico em caso de falha
          ./bin/advpls cli compile_script_ansi.ini --log-file advpls.log || (echo "--- LOG DE ERRO ---" && cat advpls.log && exit 1)