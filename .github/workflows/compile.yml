name: Compile Protheus

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: "Configurar Permissoes e Compilar"
        env:
          SERVER: ${{ secrets.PROTHEUS_SERVER }}
          ENV: ${{ secrets.PROTHEUS_ENV }}
          USER_NAME: ${{ secrets.PROTHEUS_USER }}
          PASSWORD: ${{ secrets.PROTHEUS_PASS }}
        run: |
          chmod +x ./bin/advpls
          
          # Criar template do script (Híbrido: satisfaz versões antigas e novas parsers)
          cat <<'EOF' > compile_script.template
          [authentication]
          action=authentication
          server=$SERVER
          port=1234
          secure=0
          environment=$ENV
          user=$USER_NAME
          psw=$PASSWORD
          
          [compile]
          action=compile
          program=${GITHUB_WORKSPACE}/src
          includes=${GITHUB_WORKSPACE}/includes
          recompile=T
          EOF
          
          # Injetar variáveis de ambiente de forma segura
          envsubst < compile_script.template > compile_script.ini
          
          # Converter para CRLF (Windows) e CP1252 (ANSI) - Essencial para ferramentas TOTVS
          sed -i 's/$/\r/' compile_script.ini
          iconv -f UTF-8 -t CP1252 compile_script.ini > compile_script_ansi.ini
          
          # Debug: Verificar o script gerado
          echo "--- DEBUG: SCRIPT TEMPLATE ---"
          cat compile_script.ini
          
          # Executar compilação (Modo cli com log ao final)
          ./bin/advpls cli compile_script_ansi.ini --log-file advpls.log || (echo "--- LOG DE ERRO ---" && cat advpls.log && exit 1)