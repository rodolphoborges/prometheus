name: Compile Protheus

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: "Configurar Permissoes e Compilar"
        env:
          SERVER: ${{ secrets.PROTHEUS_SERVER }}
          ENV: ${{ secrets.PROTHEUS_ENV }}
          USER_NAME: ${{ secrets.PROTHEUS_USER }}
          PASSWORD: ${{ secrets.PROTHEUS_PASS }}
        run: |
          chmod +x ./bin/advpls
          
          # Criar template do script (formato oficial TDS-LS para o modo cli)
          cat <<'EOF' > compile_script.template
          [ACTION_01]
          action=authentication
          server=$SERVER
          port=1234
          secure=0
          environment=$ENV
          user=$USER_NAME
          psw=$PASSWORD
          
          [ACTION_02]
          action=compile
          program=${GITHUB_WORKSPACE}/src
          includes=${GITHUB_WORKSPACE}/includes
          recompile=T
          EOF
          
          # Injetar variáveis de ambiente de forma segura
          envsubst < compile_script.template > compile_script.ini
          
          # O TDS-CLI (LS) exige encoding CP1252 para scripts de execução
          iconv -f UTF-8 -t CP1252 compile_script.ini > compile_script_ansi.ini
          
          # Debug: Verificar se o script foi criado e qual seu conteúdo (UTF-8)
          echo "--- DEBUG: SCRIPT TEMPLATE ---"
          cat compile_script.ini
          ls -l compile_script_ansi.ini
          
          # Executar compilação (Opções devem vir ANTES do modo 'cli')
          ./bin/advpls --log-file advpls.log cli compile_script_ansi.ini || (echo "--- LOG DE ERRO ---" && cat advpls.log && exit 1)