name: "Compilacao Protheus 2310"
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do Codigo"
        uses: actions/checkout@v4

      - name: "Instalar TDS-CLI (Linux)"
        run: |
          # 1. Cria a pasta para o binário
          mkdir -p ./bin
          
          # 2. Baixa o pacote zip oficial do TDS-LS (que contém o CLI)
          # Link baseado na documentação oficial: tds-ls/bin/linux/tds-cli.zip
          wget https://github.com/totvs/tds-ls/raw/master/bin/linux/tds-cli.zip -O ./bin/tds-cli.zip
          
          # 3. Descompacta o binário
          unzip ./bin/tds-cli.zip -d ./bin/
          
          # 4. Dá permissão de execução
          chmod +x ./bin/tds-cli

      - name: "Compilar Fontes no Protheus"
        run: |
          ./bin/tds-cli compile \
            --server ${{ secrets.PROTHEUS_SERVER }} \
            --port 1234 \
            --environment ${{ secrets.PROTHEUS_ENV }} \
            --user ${{ secrets.PROTHEUS_USER }} \
            --password "${{ secrets.PROTHEUS_PASS }}" \
            --program "${{ github.workspace }}/src" \
            --include "${{ github.workspace }}/includes" \
            --save-logs
